<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
    --bg: #f5f0e8;
    --bg-card: #fefcf8;
    --bg-soft: #faf6ef;
    --bg-hover: #fffdf7;
    --border: #d4c5a0;
    --border-soft: #e0d5be;
    --accent: #8b6914;
    --accent-light: #c8963e;
    --accent-glow: #c8963e15;
    --text: #3c3a38;
    --text-title: #2a2018;
    --text-muted: #8b7355;
    --text-faint: #b8a080;
    --radius: 14px;
    --radius-sm: 10px;
    --shadow-sm: 0 1px 3px #00000008;
    --shadow-md: 0 4px 16px #3c3a380a;
    --shadow-lg: 0 8px 28px #3c3a3810;
    --transition: .25s cubic-bezier(.4,0,.2,1);
}
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); background-image: radial-gradient(circle at 20% 0%, #faf6ef 0%, transparent 50%), radial-gradient(circle at 80% 100%, #f0e8d530 0%, transparent 50%); color: var(--text); min-height: 100vh; line-height: 1.8; -webkit-font-smoothing: antialiased; }

/* ---- Layout ---- */
.main-layout { display: flex; max-width: 1300px; margin: 0 auto; padding: 24px 32px; gap: 0; }
.article-col { flex: 1; min-width: 0; padding-right: 28px; }
.ai-col { width: 380px; flex-shrink: 0; position: relative; }

/* ---- Top bar ---- */
.top-bar { display: flex; align-items: center; gap: 12px; padding: 12px 0; margin-bottom: 24px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: #f5f0e8f2; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index: 10; flex-wrap: wrap; }
.btn-back { color: var(--accent); text-decoration: none; font-size: 14px; padding: 7px 16px; border: 1px solid #c8963e40; border-radius: 8px; transition: all var(--transition); white-space: nowrap; background: var(--bg-soft); box-shadow: var(--shadow-sm); }
.btn-back:hover { color: var(--text-title); border-color: var(--accent-light); background: var(--bg-hover); transform: translateY(-1px); box-shadow: var(--shadow-md); }
.article-source { color: var(--accent); font-size: 13px; font-weight: 600; background: var(--accent-glow); padding: 3px 12px; border-radius: 6px; }
.article-meta { color: var(--text-muted); font-size: 12px; margin-left: auto; }
.mode-badge { font-size: 11px; padding: 2px 10px; border-radius: 10px; font-weight: 600; }
.mode-badge.html { background: #6b8f5e15; color: #4a6d3c; border: 1px solid #6b8f5e30; }
.view-switch { display: inline-flex; background: #ede0c8; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
.view-switch a { padding: 4px 12px; font-size: 12px; color: var(--text-muted); text-decoration: none; transition: all .2s; }
.view-switch a.active { background: var(--border); color: var(--text); font-weight: 600; }

/* ---- Article ---- */
.article-header { margin-bottom: 32px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
.article-header h1 { font-size: 28px; font-weight: 800; line-height: 1.4; margin-bottom: 12px; color: var(--text-title); background: linear-gradient(135deg, #4a3728, #6b5535); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.article-header .meta-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; font-size: 13px; color: var(--text-muted); }
.article-header .source-tag { background: var(--accent-glow); color: var(--accent); padding: 2px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; }
.tags-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
.tag { font-size: 11px; padding: 2px 8px; background: #f0e8d5; border-radius: 6px; color: var(--text-muted); transition: all .15s; }
.tag:hover { background: #e8dcc0; color: var(--text); }
.article-body { font-size: 17px; color: #5c4a32; }
.article-body h2 { font-size: 24px; font-weight: 700; margin: 36px 0 18px; color: var(--text-title); padding-bottom: 8px; border-bottom: 2px solid #ede0c8; }
.article-body h3 { font-size: 19px; font-weight: 600; margin: 28px 0 14px; color: var(--text); }
.article-body h4 { font-size: 16px; font-weight: 600; margin: 22px 0 10px; color: #5c4a32; }
.article-body p { margin: 12px 0; }
.article-body strong { color: var(--text-title); font-weight: 700; }
.article-body a { color: var(--accent); text-decoration: none; border-bottom: 1px solid #c8963e40; transition: all .2s; }
.article-body a:hover { color: #6b4c1e; border-bottom-color: var(--accent-light); }
.article-body img { max-width: 100%; height: auto; border-radius: var(--radius-sm); margin: 16px 0; border: 1px solid var(--border-soft); box-shadow: var(--shadow-sm); }
.article-body blockquote { border-left: 4px solid var(--accent-light); padding: 12px 20px; margin: 18px 0; background: var(--bg-soft); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; color: #6b4c1e; }
.article-body blockquote p { margin: 4px 0; }
.article-body code { background: #ede0c8; padding: 2px 7px; border-radius: 4px; font-size: 14px; color: var(--accent); }
.article-body pre { background: var(--bg-soft); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px 20px; overflow-x: auto; margin: 16px 0; font-size: 13px; line-height: 1.7; }
.article-body pre code { background: none; padding: 0; color: var(--text); }
.article-body ul, .article-body ol { margin: 12px 0; padding-left: 24px; color: #5c4a32; }
.article-body li { margin: 6px 0; }
.article-body hr { border: none; border-top: 1px solid var(--border); margin: 28px 0; }
.article-body table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 14px; }
.article-body th { background: #ede0c8; padding: 10px 14px; text-align: left; color: var(--text-title); font-weight: 600; border-bottom: 2px solid #c8963e40; }
.article-body td { padding: 8px 14px; border-bottom: 1px solid #ede0c8; color: #5c4a32; }
.loading { text-align: center; padding: 80px 20px; color: var(--text-muted); font-size: 16px; }
.error-box { background: #dc5b5b10; border: 1px solid #dc5b5b30; border-radius: var(--radius); padding: 20px; text-align: center; color: #b04444; margin: 40px 0; }

/* ---- AI Sidebar ---- */
.ai-sidebar { position: sticky; top: 80px; display: flex; flex-direction: column; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); height: calc(100vh - 100px); overflow: hidden; box-shadow: var(--shadow-sm); }
.ai-sidebar-header { padding: 16px 18px; border-bottom: 1px solid #ede0c8; display: flex; align-items: center; gap: 8px; font-weight: 700; color: var(--text-title); font-size: 14px; flex-shrink: 0; }
.ai-sidebar-header .ai-dot { width: 8px; height: 8px; border-radius: 50%; background: #6b8f5e; box-shadow: 0 0 0 3px #6b8f5e20; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%, 100% { box-shadow: 0 0 0 3px #6b8f5e20; } 50% { box-shadow: 0 0 0 5px #6b8f5e10; } }
.ai-chat { flex: 1; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
.ai-chat .ai-msg { font-size: 13px; line-height: 1.7; padding: 10px 14px; border-radius: var(--radius-sm); max-width: 100%; animation: msgIn .25s ease; }
@keyframes msgIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.ai-chat .ai-msg.user { align-self: flex-end; background: var(--accent-glow); color: var(--text); }
.ai-chat .ai-msg.assistant { align-self: flex-start; background: #ede0c8; color: var(--text); }
.ai-chat .ai-msg.assistant .ai-msg-label { font-size: 10px; color: var(--text-muted); margin-bottom: 4px; font-weight: 600; }
.ai-input-area { padding: 12px 14px; border-top: 1px solid #ede0c8; display: flex; gap: 8px; flex-shrink: 0; }
.ai-input-area textarea { flex: 1; border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 13px; font-family: inherit; resize: none; background: var(--bg-soft); color: var(--text); outline: none; line-height: 1.5; height: 44px; transition: border-color .2s; }
.ai-input-area textarea:focus { border-color: var(--accent-light); }
.ai-input-area button { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 0 16px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all var(--transition); white-space: nowrap; }
.ai-input-area button:hover { background: #6b4c1e; transform: translateY(-1px); }
.ai-input-area button:disabled { opacity: .5; cursor: not-allowed; transform: none; }
.ai-empty { text-align: center; color: var(--text-faint); font-size: 13px; padding: 24px 12px; line-height: 1.8; }

/* ---- selection popup ---- */
.sel-popup { position: fixed; z-index: 9999; display: none; background: var(--bg-card); border: 1px solid var(--accent-light); border-radius: 8px; padding: 5px 10px; box-shadow: var(--shadow-md); cursor: pointer; font-size: 12px; font-weight: 600; color: #6b4c1e; transition: all var(--transition); }
.sel-popup:hover { background: var(--bg-soft); transform: translateY(-1px); }

/* ---- fav button in article ---- */
.btn-fav-article { background: none; border: 1px solid var(--border); border-radius: 7px; padding: 5px 10px; cursor: pointer; font-size: 16px; color: var(--text-muted); transition: all var(--transition); line-height: 1; }
.btn-fav-article:hover { border-color: var(--accent-light); color: var(--accent-light); transform: scale(1.1); }
.btn-fav-article.faved { color: var(--accent-light); border-color: #c8963e50; background: #c8963e10; }

/* ---- Scrollbar ---- */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent-light); }

@media (max-width: 800px) {
  .main-layout { flex-direction: column; padding: 14px; }
  .ai-col { width: 100%; margin-top: 24px; }
  .ai-sidebar { height: 360px; position: static; }
  .article-col { padding-right: 0; }
  .article-header h1 { font-size: 22px; }
}
/* ---- Notes Sidebar ---- */
.notes-sidebar { position: fixed; right: -360px; top: 0; width: 330px; height: 100vh; background: var(--bg-card); border-left: 1px solid var(--border); z-index: 500; overflow-y: auto; transition: right .3s cubic-bezier(.4,0,.2,1); box-shadow: -2px 0 16px #00000008; }
.notes-sidebar.open { right: 0; }
.notes-sidebar-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--bg-card); z-index: 2; }
.notes-sidebar-header h3 { color: var(--text-title); font-size: 15px; font-weight: 700; margin: 0; }
.notes-sidebar-header button { background: none; border: none; color: var(--text-faint); font-size: 18px; cursor: pointer; padding: 2px 6px; transition: color .2s; }
.notes-sidebar-header button:hover { color: var(--text-title); }
.note-item { padding: 12px 18px; border-bottom: 1px solid #f0e8d5; cursor: pointer; transition: background .15s; }
.note-item:hover { background: var(--bg-soft); }
.note-item .hl-text { color: #6b4c1e; font-size: 13px; line-height: 1.6; margin-bottom: 4px; border-left: 3px solid var(--accent-light); padding-left: 10px; }
.note-item .hl-note { color: #5c4a32; font-size: 12px; line-height: 1.5; background: var(--bg-soft); padding: 6px 10px; border-radius: 6px; margin-top: 6px; }
.note-item .hl-meta { color: var(--text-faint); font-size: 11px; margin-top: 6px; display: flex; align-items: center; gap: 10px; }
.note-item .hl-meta button { background: none; border: none; color: #dc5b5b; font-size: 11px; cursor: pointer; padding: 0; }
.note-item .hl-meta button:hover { color: #b04444; }
.notes-sidebar .empty { text-align: center; padding: 50px 20px; color: var(--text-faint); font-size: 14px; line-height: 2; }
.btn-notes-toggle { position: fixed; right: 16px; bottom: 80px; z-index: 501; background: var(--accent); color: #fff; border: none; width: 44px; height: 44px; border-radius: 12px; font-size: 16px; cursor: pointer; box-shadow: 0 4px 16px #8b691430; transition: all var(--transition); display: flex; align-items: center; justify-content: center; }
.btn-notes-toggle:hover { background: #6b4c1e; transform: scale(1.05); }
.btn-notes-toggle .badge { position: absolute; top: -5px; right: -5px; background: #dc5b5b; color: #fff; font-size: 10px; width: 18px; height: 18px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-weight: 700; }
.btn-notes-sync { font-size: 11px; color: var(--accent); background: #f0e8d5; border: 1px solid var(--border); padding: 3px 10px; border-radius: 6px; cursor: pointer; font-weight: 500; transition: all .15s; }
.btn-notes-sync:hover { background: #e8dcc0; }
.article-body mark.hl.flash { outline: 3px solid #fbbf24; outline-offset: 2px; transition: outline .3s; }

<div class="main-layout">
  <div class="article-col" id="app">
    <div class="loading">📖 加载中...</div>
  </div>
  <div class="ai-col" id="ai-col">
    <div class="ai-sidebar">
      <div class="ai-sidebar-header"><span class="ai-dot"></span> AI 助手<button onclick="clearHistory()" style="margin-left:auto;background:none;border:1px solid #d4c5a0;border-radius:6px;padding:2px 10px;font-size:11px;color:#8b7355;cursor:pointer">清除</button></div>
      <div class="ai-chat" id="ai-chat">
        <div class="ai-empty">💡 划选文章中的文字可自动填入<br>输入问题后点发送</div>
      </div>
      <div class="ai-input-area">
        <textarea id="ai-input" placeholder="划选文字或输入问题..." rows="1"></textarea>
        <button id="ai-send" onclick="sendAI()">发送</button>
      </div>
    </div>
  </div>
</div>

<script>
(async function() {
  const params = new URLSearchParams(location.search);
  const file = params.get('file');
  if (!file) { document.getElementById('app').innerHTML = '<div class="error-box">❌ 缺少 file 参数</div>'; return; }
  let mdUrl = file.startsWith('http') || file.startsWith('/') ? file : './' + file;
  try {
    const res = await fetch(mdUrl);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    let title = '', source = '', tags = [], body = text;
    if (text.startsWith('---')) {
      const endIdx = text.indexOf('---', 3);
      if (endIdx !== -1) {
        const fm = text.slice(3, endIdx).trim(); body = text.slice(endIdx + 3).trim();
        fm.split('\n').forEach(line => {
          const ci = line.indexOf(':'); if (ci === -1) return;
          const key = line.slice(0, ci).trim(); let val = line.slice(ci + 1).trim().replace(/^["']|["']$/g, '');
          if (key === 'title') title = val; if (key === 'source') source = val;
          if (key === 'tags') { try { tags = JSON.parse(val); } catch(e) { tags = val.replace(/[\[\]]/g, '').split(',').map(s => s.trim().replace(/["']/g, '')); } }
        });
      }
    }
    if (!title) { const h1m = body.match(/^#\s+(.+)/m); if (h1m) { title = h1m[1]; body = body.replace(h1m[0], '').trim(); } }
    if (!title) title = file.split('/').pop().replace('.md', '');
    let htmlContent = '';
    if (typeof marked !== 'undefined') { marked.setOptions({ breaks: true, gfm: true }); htmlContent = marked.parse(body); }

/* ---- AI Sidebar logic ---- */
let articleFullText = '';
function initAI() {
  articleFullText = document.querySelector('.article-body')?.textContent || '';

  // Make file accessible globally for highlight key

  const saved = sessionStorage.getItem('ai_chat_history');

  document.addEventListener('mouseup', () => {

      if (document.querySelector('#hl-note-panel[style*="block"]')) return;
      savedSel = txt;
      savedRange = sel.getRangeAt(0).cloneRange();  // 保存选区，防止点击按钮时丢失
      const rect = savedRange.getBoundingClientRect();
      selToolbar.style.display = 'flex';
      selToolbar.style.left = Math.max(4, Math.min(rect.left + rect.width/2 - 60, window.innerWidth - 140)) + 'px';

  document.getElementById('sel-btn-ai').addEventListener('click', () => {

  document.getElementById('sel-btn-hl').addEventListener('click', () => {
    if (!savedRange || !savedSel) return;
    const hlId = addHighlightReturnId(savedRange, savedSel);
    selToolbar.style.display = 'none';
    // 立即弹出笔记输入框
    if (hlId) {
      currentHLId = hlId;
      document.getElementById('hl-note-text').value = '';
      const sp = document.querySelector('[data-hl-group="' + hlId + '"]') || document.getElementById(hlId);
      if (sp) {
        const r = sp.getBoundingClientRect();
        notePanel.style.display = 'block';
        let left = Math.max(8, Math.min(r.left, window.innerWidth - 308));
        let top = r.bottom + 6;
        if (top + 100 > window.innerHeight) { top = r.top - 100 - 6; if (top < 8) top = 8; }

        notePanel.style.top = top + 'px';
      }
      document.getElementById('hl-note-text').focus();
    }
    savedSel = ''; savedRange = null;
  });

  document.getElementById('sel-btn-ai').addEventListener('mouseenter', function(){this.style.background='#f0e8d5';});
  document.getElementById('sel-btn-ai').addEventListener('mouseleave', function(){this.style.background='transparent';});
  document.getElementById('sel-btn-hl').addEventListener('mouseenter', function(){this.style.background='#f0e8d5';});
  document.getElementById('sel-btn-hl').addEventListener('mouseleave', function(){this.style.background='transparent';});

  document.addEventListener('mousedown', (e) => {
    if (!selToolbar.contains(e.target)) selToolbar.style.display = 'none';

  // Enter to send
  document.getElementById('ai-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendAI(); }
  });

  // ====== 划线 & 批注 ======
  const HL_KEY = 'hl_' + (window._highlightFile || '').replace(/[^a-zA-Z0-9]/g, '_');
  let highlights = [];
  try { highlights = JSON.parse(localStorage.getItem(HL_KEY) || '[]'); } catch(e) {}

  // Auto-sync helper
  const NOTES_SYNC_API = (location.hostname==='localhost'||location.hostname==='127.0.0.1') ? '/api/notes' : null;
  function syncToServer(id, text, note) {
    if (!NOTES_SYNC_API) return;
    fetch(NOTES_SYNC_API, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({article: window._highlightFile||'', text:text, note:note})}).catch(function(){});
  }
  function deleteOnServer(id) {
    if (!NOTES_SYNC_API) return;
    fetch(NOTES_SYNC_API+'/delete', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({article: window._highlightFile||'', id:id})}).catch(function(){});
  }
  function loadFromServer() {
    if (!NOTES_SYNC_API || !window._highlightFile) return;
    fetch(NOTES_SYNC_API+'?article='+encodeURIComponent(window._highlightFile)).then(function(r){return r.json();}).then(function(serverHL){
      if (!Array.isArray(serverHL) || !serverHL.length) return;
      var local = JSON.parse(localStorage.getItem(HL_KEY) || '[]');
      var localIds = {}; local.forEach(function(h){ localIds[h.id] = true; });
      var merged = false;
      serverHL.forEach(function(sh){
        if (!localIds[sh.id]) { local.push(sh); merged = true; }
      });
      if (merged) { localStorage.setItem(HL_KEY, JSON.stringify(local)); highlights = local; updateHLStyles(); }
    }).catch(function(){});
  }
  setTimeout(loadFromServer, 1200);

  function saveHL() {
    localStorage.setItem(HL_KEY, JSON.stringify(highlights));
    // Auto-sync latest highlight to server
    if (highlights.length) {
      var h = highlights[highlights.length-1];
      syncToServer(h.id, h.text, h.note||'');
    }
  }

  const notePanel = document.createElement('div');
  notePanel.style.cssText = 'position:fixed;z-index:9999;display:none;background:#fefcf8;border:2px solid #c8963e;border-radius:12px;padding:12px;box-shadow:0 4px 20px #00000020;width:300px;';
  notePanel.innerHTML = '<textarea id="hl-note-text" placeholder="写下想法..." style="width:100%;height:60px;border:1px solid #d4c5a0;border-radius:8px;padding:8px;font-size:13px;font-family:inherit;resize:none;background:#faf6ef;color:#3c3a38;outline:none"></textarea><div style="display:flex;gap:8px;margin-top:8px;align-items:center"><button id="hl-note-delete" style="background:none;border:1px solid #d4c5a0;border-radius:6px;padding:5px 10px;cursor:pointer;font-size:12px;color:#b85c3a;white-space:nowrap" title="删除这条划线">🗑 删除</button><span style="flex:1"></span><button id="hl-note-save" style="background:#8b6914;color:#fff;border:none;border-radius:6px;padding:5px 14px;cursor:pointer;font-size:12px;font-weight:600">保存</button><button id="hl-note-cancel" style="background:none;border:1px solid #d4c5a0;border-radius:6px;padding:5px 14px;cursor:pointer;font-size:12px;color:#8b7355">取消</button></div>';
  notePanel.id = 'hl-note-panel';
  document.body.appendChild(notePanel);

  let currentHLId = null;
  document.getElementById('hl-note-save').addEventListener('click', () => {
    const text = document.getElementById('hl-note-text').value.trim();
    if (!text || !currentHLId) { notePanel.style.display = 'none'; return; }
    const hl = highlights.find(h => h.id === currentHLId);
    if (hl) { hl.note = text; saveHL(); updateHLStyles(); syncToServer(hl.id, hl.text, text); }
    notePanel.style.display = 'none';
  });
  document.getElementById('hl-note-cancel').addEventListener('click', () => { notePanel.style.display = 'none'; });
  document.getElementById('hl-note-delete').addEventListener('click', () => {
    if (!currentHLId) return;
    if (!confirm('确定删除这条划线及笔记？')) return;
    removeHighlight(currentHLId);
    notePanel.style.display = 'none';
    currentHLId = null;
  });

  // 删除划线：移除 DOM 高亮 + localStorage + 服务端
  function removeHighlight(hid) {
    // 移除 DOM 中的高亮 span
    document.querySelectorAll('.user-highlight').forEach(el => {
      if ((el.getAttribute('data-hl-group') || el.id.replace(/_\d+$/, '')) === hid) {
        const parent = el.parentNode;
        while (el.firstChild) { parent.insertBefore(el.firstChild, el); }
        parent.removeChild(el);
        parent.normalize();
      }
    });
    // 从 highlights 数组中移除
    highlights = highlights.filter(h => h.id !== hid);
    saveHL();
    updateHLStyles();
    deleteOnServer(hid);
    // 关闭面板（如果还开着）
    if (currentHLId === hid) { notePanel.style.display = 'none'; currentHLId = null; }
  }

  function updateHLStyles() {
    highlights.forEach(hl => {
      const span = document.getElementById(hl.id);
      if (span) {
        span.style.background = hl.note ? '#8b691420' : '#c8963e40';
        span.title = hl.note ? '💭 ' + hl.note : '点击添加笔记';
      }
    });
  }

  // 跨节点包裹 range 内所有文本片段
  function wrapRangeMultiNode(range, id, hlData) {
    const body = document.querySelector('.article-body');
    const walker = document.createTreeWalker(body, NodeFilter.SHOW_TEXT, null, false);
    const spans = [];
    let n;
    while (n = walker.nextNode()) {
      if (n.parentElement?.closest('.user-highlight') || n.parentElement?.closest('.ai-col')) continue;
      if (!range.intersectsNode(n)) continue;
      const r = document.createRange();
      const start = (n === range.startContainer) ? range.startOffset : 0;
      const end = (n === range.endContainer) ? range.endOffset : n.textContent.length;
      if (start >= end) continue;
      r.setStart(n, start);
      r.setEnd(n, end);
      const span = document.createElement('span');
      span.className = 'user-highlight'; span.id = spans.length === 0 ? id : (id + '_' + spans.length);
      span.setAttribute('data-hl-group', id);
      span.style.cssText = 'background:#c8963e40;border-bottom:2px solid #c8963e;cursor:pointer;padding:1px 0;transition:background .2s';
      span.title = '点击添加笔记';
      try {
        r.surroundContents(span);
        spans.push(span);
      } catch(e) {}
    }
    return spans;
  }

  // 划线并返回 ID（供立即弹笔记框用）
  function addHighlightReturnId(range, txt) {
    const id = 'hl_' + Date.now();
    const spans = wrapRangeMultiNode(range, id, {});
    if (spans.length === 0) return null;
    highlights.push({ id, text: txt, note: '' });
    saveHL();
    bindHighlightEvents(spans, id);
    return id;
  }

  // 高亮点击弹出笔记面板（toggle：再点同一句关闭）
  function showNotePanel(span, hlId) {
    // 同一句再点 → 关闭
    if (notePanel.style.display === 'block' && currentHLId === hlId) {
      notePanel.style.display = 'none';
      currentHLId = null;
      return;
    }
    currentHLId = hlId;
    const hl = highlights.find(h => h.id === hlId);
    document.getElementById('hl-note-text').value = hl?.note || '';
    const r = span.getBoundingClientRect();
    notePanel.style.display = 'block';
    // 面板贴近划线：优先放下方，空间不足时放上方
    let left = Math.max(8, Math.min(r.left, window.innerWidth - 308));
    let top = r.bottom + 6;
    if (top + 100 > window.innerHeight) { top = r.top - 100 - 6; if (top < 8) top = 8; }
    notePanel.style.left = left + 'px';
    notePanel.style.top = top + 'px';
    document.getElementById('hl-note-text').focus();
  }

  // 事件委托：在 .article-body 上统一监听高亮点击/hover
  const _articleBody = document.querySelector('.article-body');
  if (_articleBody) {
    _articleBody.addEventListener('click', function(ev) {
      const span = ev.target.closest('.user-highlight');
      if (!span) return;
      ev.stopPropagation();
      const groupId = span.getAttribute('data-hl-group') || span.id.replace(/_\d+$/, '');
      showNotePanel(span, groupId);
    });
    _articleBody.addEventListener('mouseover', function(ev) {
      const span = ev.target.closest('.user-highlight');
      if (span && (notePanel.style.display === 'none' || !notePanel.style.display)) span.style.background = '#c8963e60';
    });
    _articleBody.addEventListener('mouseout', function(ev) {
      const span = ev.target.closest('.user-highlight');
      if (span) {
        const groupId = span.getAttribute('data-hl-group') || span.id.replace(/_\d+$/, '');
        const hl = highlights.find(h => h.id === groupId);
        span.style.background = hl?.note ? '#8b691420' : '#c8963e40';
      }
    });
  }

  function bindHighlightEvents(spans, id) {
    // onclick 已内联到 span，此函数保留兼容
  }

  // 共享的划线函数（工具栏和独立调用）
  function addHighlight(range, txt) {
    addHighlightReturnId(range, txt);
  }

  function collectTextNodes(body) {
    const walker = document.createTreeWalker(body, NodeFilter.SHOW_TEXT, null, false);
    const textNodes = [];
    let node;
    while (node = walker.nextNode()) {
      if (node.parentElement?.closest('.user-highlight') || node.parentElement?.closest('.ai-col')) continue;
      if (node.textContent.length > 0) textNodes.push(node);
    }
    return textNodes;
  }

  function buildTextMap(textNodes) {
    let fullText = '';
    const offsets = [];
    textNodes.forEach(tn => {
      offsets.push({node: tn, start: fullText.length, end: fullText.length + tn.textContent.length});
      fullText += tn.textContent;
    });
    return { fullText, offsets };
  }

  function restoreHighlights() {
    const body = document.querySelector('.article-body');
    if (!body) return;

    // 每次恢复一个高亮后 DOM 会变（surroundContents 拆分文本节点），需要重新收集
    highlights.forEach(hl => {
      const textNodes = collectTextNodes(body);
      const { fullText, offsets } = buildTextMap(textNodes);
      const searchText = hl.text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
      let idx = fullText.indexOf(searchText);
      if (idx < 0) {
        const normFull = fullText.replace(/\s+/g, ' ');
        const normSearch = searchText.replace(/\s+/g, ' ');
        idx = normFull.indexOf(normSearch);
        if (idx < 0) return;
        let fi = 0, ni = 0;
        while (ni < idx) {
          if (/\s/.test(fullText[fi])) { while (fi < fullText.length && /\s/.test(fullText[fi])) fi++; ni++; }
          else { fi++; ni++; }
        }
        idx = fi;
      }
      const hlEnd = idx + searchText.length;
      const id = hl.id;
      const createdSpans = [];

      for (const off of offsets) {
        if (off.end <= idx || off.start >= hlEnd) continue;
        const segStart = Math.max(idx, off.start) - off.start;
        const segEnd = Math.min(hlEnd, off.end) - off.start;
        try {
          const range = document.createRange();
          range.setStart(off.node, segStart);
          range.setEnd(off.node, segEnd);
          const span = document.createElement('span');
          span.className = 'user-highlight';
          span.id = off.start === idx ? id : (id + '_' + off.start);
          span.setAttribute('data-hl-group', id);
          span.style.cssText = `background:${hl.note ? '#8b691420' : '#c8963e40'};border-bottom:2px solid #c8963e;cursor:pointer;padding:1px 0;transition:background .2s`;
          span.title = hl.note ? '💭 ' + hl.note : '点击添加笔记';
          range.surroundContents(span);
          createdSpans.push(span);
        } catch(e) {}
      }
      if (createdSpans.length > 0) bindHighlightEvents(createdSpans, id);
    });
  }

  // 点击空白处关闭笔记面板
  document.addEventListener('click', (e) => {
    if (notePanel.style.display === 'none') return;
    const target = e.target.nodeType === 3 ? e.target.parentElement : e.target;
    if (notePanel.contains(target)) return;
    if (target.closest('.user-highlight')) return;
    if (target.closest('#sel-toolbar') || target.closest('#sel-btn-hl')) return;
    notePanel.style.display = 'none';
  });

  // 内容已加载，恢复已有高亮
  restoreHighlights();
}

async function sendAI() {
  const input = document.getElementById('ai-input');
  const btn = document.getElementById('ai-send');
  const chat = document.getElementById('ai-chat');
  const question = input.value.trim();
  if (!question) return;

  // Clear empty state
  const emptyEl = chat.querySelector('.ai-empty');
  if (emptyEl) emptyEl.remove();

  // Add user message
  chat.innerHTML += '<div class="ai-msg user">' + question + '</div>';

  // Add loading
  const loadId = 'load_' + Date.now();
  chat.innerHTML += '<div class="ai-msg assistant" id="' + loadId + '"><div class="ai-msg-label">🤔 思考中...</div></div>';
  chat.scrollTop = chat.scrollHeight;

  input.value = ''; btn.disabled = true;

  try {
    const res = await fetch('/api/explain', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text: question,
        context: articleFullText
      })
    });
    const data = await res.json();
    const loadEl = document.getElementById(loadId);
    if (loadEl) {
      if (data.ok) {
        loadEl.innerHTML = '<div class="ai-msg-label">🤖 AI</div>' + data.explanation.replace(/\n/g, '<br>');
      } else {
        loadEl.innerHTML = '<div class="ai-msg-label">❌ 失败</div>' + (data.error || '未知错误');
      }
    }
  } catch (err) {
    const loadEl = document.getElementById(loadId);
    if (loadEl) loadEl.innerHTML = '<div class="ai-msg-label">❌ 网络错误</div>' + err.message;
  }

  btn.disabled = false;
  chat.scrollTop = chat.scrollHeight;
  input.focus();

  // 保存历史（去掉 loading 占位）
  const loadEl = document.getElementById(loadId);
  sessionStorage.setItem('ai_chat_history', chat.innerHTML);
}

function clearHistory() {
  sessionStorage.removeItem('ai_chat_history');
  const chat = document.getElementById('ai-chat');
  chat.innerHTML = '<div class="ai-empty">💡 划选文章中的文字可自动填入<br>输入问题后点发送</div>';
}

<script>

(function(){

  function getHLKey() {

  }
  function readHL() {
    try { return JSON.parse(localStorage.getItem(getHLKey()) || '[]'); } catch(e) { return []; }
  }
  function renderSidebar() {
    var hl = readHL();
    var c = document.getElementById('notes-list');
    var b = document.getElementById('notes-badge');
    if (!c) return;
    if (!hl.length) {
      c.innerHTML = '<div class="empty">选中文字 → 点击"🖍 划线"<br>即可添加笔记</div>';
      if (b) b.style.display = 'none';
      return;
    }
    if (b) { b.style.display = ''; b.textContent = hl.length; }
    c.innerHTML = hl.map(function(h){
      var txt = h.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      var note = h.note ? '<div class="hl-note">💬 '+h.note.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div>' : '';
      return '<div class="note-item" onclick="var m=document.querySelector(\'mark.hl[data-hid=&quot;'+h.id+'&quot;]\');if(m){m.scrollIntoView({behavior:\'smooth\',block:\'center\'});m.classList.add(\'flash\');setTimeout(function(){m.classList.remove(\'flash\')},1200)}"><div class="hl-text">'+txt+'</div>'+note+'<div class="hl-meta"><span>'+ (h.time||'') +'</span><button onclick="event.stopPropagation();deleteNoteSidebar(\''+h.id+'\')">删除</button></div></div>';
    }).join('');
  }
  window.toggleNotes = function() {
    var s = document.getElementById('notes-sidebar');
    if (s) { s.classList.toggle('open'); renderSidebar(); }
  };
  window.deleteNoteSidebar = function(hid) {
    if (!confirm('删除这条笔记？')) return;
    // Remove from localStorage
    var hl = readHL();
    hl = hl.filter(function(h){ return h.id !== hid; });
    localStorage.setItem(getHLKey(), JSON.stringify(hl));
    // Remove ALL visual highlight fragments from DOM (handles multi-fragment spans)
    document.querySelectorAll('.user-highlight').forEach(function(el) {
      var gid = el.getAttribute('data-hl-group') || el.id.replace(/_\d+$/, '');
      if (gid === hid) {
        var parent = el.parentNode;
        while (el.firstChild) { parent.insertBefore(el.firstChild, el); }
        parent.removeChild(el);
        parent.normalize();
      }
    });
    // Also remove from server
    var NOTES_SYNC_API2 = (location.hostname==='localhost'||location.hostname==='127.0.0.1') ? '/api/notes' : null;
    if (NOTES_SYNC_API2) {
      fetch(NOTES_SYNC_API2+'/delete', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({article: window._highlightFile||'', id: hid})}).catch(function(){});
    }
    renderSidebar();
  };
  window.syncNotesToServer = function() {
    if (!NOTES_API) return;
    var hl = readHL();
    if (!hl.length) return;
    var file = window._highlightFile || '';
    var promises = hl.map(function(h){
      return fetch(NOTES_API, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({article:file, text:h.text, note:h.note||''})}).catch(function(){});
    });
    Promise.all(promises).then(function(){
      var btn = document.getElementById('btn-notes-sync');
      if (btn) { btn.textContent = '✅ 已同步'; setTimeout(function(){ btn.textContent = '💾 同步'; }, 2000); }
    });
  };
  setInterval(renderSidebar, 3000);
  setTimeout(renderSidebar, 1500);
})();
</script>

<script>
function initArticleTheme() {
  var t = document.getElementById('theme-toggle-article');
  if (!t) return;
  if (t._themeBound) return;
  t._themeBound = true;
  t.addEventListener('click', function(){
    var d = document.documentElement.getAttribute('data-theme') === 'dark';
    document.documentElement.setAttribute('data-theme', d ? '' : 'dark');
    t.textContent = d ? '\u{1F319}' : '\u2600\uFE0F';
    localStorage.setItem('theme', d ? 'light' : 'dark');
  });
  if (localStorage.getItem('theme') === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    t.textContent = '\u2600\uFE0F';
  }
}
</script>
